<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tao Liangce - CV</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
    }
    .introduction { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    #pdf-render-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      background: #f9f9f9;
      min-height: 500px;
      border-radius: 4px;
    }
    canvas {
      max-width: 100%;
      height: auto !important;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      background: white;
    }
  </style>
</head>
<body>

  <div class="introduction">
    <p>陶良策 - Java开发</p>
  </div>

  <div id="pdf-render-container">
    <p id="msg" style="padding: 20px;">正在加载简历预览...</p>
  </div>

  <script type="module">
    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.mjs';

    // 设置 Worker 路径（同样使用 CDN）
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.worker.mjs';

    const url = './resume.pdf'; // 确保你的简历文件还在根目录
    const container = document.getElementById('pdf-render-container');
    const msg = document.getElementById('msg');

    async function init() {
      try {
        const loadingTask = pdfjsLib.getDocument(url);
        const pdf = await loadingTask.promise;
        msg.style.display = 'none';

        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const dpr = window.devicePixelRatio || 1;
          const viewport = page.getViewport({ scale: 2 });

          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          
          canvas.height = viewport.height * dpr;
          canvas.width = viewport.width * dpr;
          canvas.style.width = '100%';
          canvas.style.maxWidth = (viewport.width / 2) + 'px';

          container.appendChild(canvas);

          context.scale(dpr, dpr);
          await page.render({ canvasContext: context, viewport: viewport }).promise;
        }
      } catch (err) {
        msg.innerHTML = "❌ 加载失败: " + err.message + "<br>请确认 resume.pdf 是否已上传。";
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
