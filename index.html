<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tao Liangce - CV</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
    }
    .introduction { margin-bottom: 20px; }
    /* PDF 渲染容器 */
    #pdf-render-container {
      width: 100%;
      border: 1px solid #ddd;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
      max-height: 85vh; /* 手机端高度控制 */
    }
    canvas {
      max-width: 100%;
      height: auto !important;
      margin-bottom: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <div class="introduction">
    <p>I am Tao Liangce, a software engineer.</p>
  </div>

  <div id="pdf-render-container">
    <p id="loading-msg">正在努力加载简历...</p>
  </div>

  <script>
    const url = 'resume.pdf'; // 确保文件名正确

    // 指定 Worker 路径
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const container = document.getElementById('pdf-render-container');
    const loadingMsg = document.getElementById('loading-msg');

    // 异步加载 PDF
    pdfjsLib.getDocument(url).promise.then(pdf => {
      loadingMsg.style.display = 'none';
      
      // 循环渲染所有页面
      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        pdf.getPage(pageNum).then(page => {
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          container.appendChild(canvas);

          const viewport = page.getViewport({ scale: 1.5 }); // 调整缩放倍数以保证清晰度
          canvas.height = viewport.height;
          canvas.width = viewport.width;

          const renderContext = {
            canvasContext: context,
            viewport: viewport
          };
          page.render(renderContext);
        });
      }
    }).catch(err => {
      loadingMsg.innerHTML = "PDF 加载失败，请检查文件是否存在。";
      console.error(err);
    });
  </script>

</body>
</html>
